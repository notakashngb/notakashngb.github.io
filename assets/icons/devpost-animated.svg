<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 24 24">
  <g fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <!-- Hexagon: r=9.5, centred at 12,12, nudged up 0.5 for optical balance -->
    <path stroke-dasharray="58" stroke-dashoffset="58"
          d="M12,2.5 L20.24,7 L20.24,17 L12,21.5 L3.76,17 L3.76,7 Z">
      <animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="58;0"/>
    </path>
    <!-- D: stem at x=9.25, top/bottom rails y=8/16, apex x=15.75 for optical centre -->
    <path stroke-dasharray="30" stroke-dashoffset="30"
          d="M9.25 8L9.25 16M9.25 8L11.75 8C14.75 8 16.25 9.75 16.25 12C16.25 14.25 14.75 16 11.75 16L9.25 16">
      <animate fill="freeze" attributeName="stroke-dashoffset" begin="0.65s" dur="0.4s" values="30;0"/>
    </path>
  </g>
</svg>
