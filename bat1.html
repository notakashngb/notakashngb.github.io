<script>
  // ─── Sketchfab Viewer API ──────────────────────────────────────────────────────
  let sfApi = null;
  let camReady = false;
  let cEye = null, cTarget = null;
  let handActive = false;

  // Smoothed centroid tracking
  let smoothX = null;
  let prevSX = null;
  const ALPHA = 0.4;
  const MIN_DELTA = 0.0005;
  const GAIN = 3.0;

  // ─── Y-axis rotation ──────────────────────────────────────────────────────────
  function rotateY(eye, target, angle) {
    const dx = eye[0] - target[0];
    const dy = eye[1] - target[1];
    const dz = eye[2] - target[2];
    const c = Math.cos(angle), s = Math.sin(angle);
    return [target[0] + dx*c - dz*s, target[1] + dy, target[2] + dx*s + dz*c];
  }

  // ─── Init Sketchfab ────────────────────────────────────────────────────────────
  (function() {
    const iframe = document.getElementById('sketchfab-iframe');
    const client = new Sketchfab(iframe);
    client.init('sBv577Vdl9lrcvyFT3vbNvkGKml', {
      success: function(api) {
        sfApi = api;
        api.start(function() {
          api.setUserInteraction(true);
          setTimeout(function() { camReady = true; }, 2500);
        });
      },
      error: function() { console.error('Sketchfab init failed'); },
      autostart:1, preload:1, transparent:1,
      ui_animations:0, ui_infos:0, ui_stop:0, ui_inspector:0,
      ui_watermark_link:0, ui_watermark:0, ui_hint:0, ui_ar:0,
      ui_help:0, ui_settings:0, ui_vr:0, ui_fullscreen:0,
      ui_annotations:0, ui_downloads:0, ui_share:0,
    });
  })();

  // ─── Hand tracking ─────────────────────────────────────────────────────────────
  const videoEl = document.getElementById('hand-video');
  const canvas  = document.getElementById('hand-canvas');
  const ctx     = canvas.getContext('2d');
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ─── Draw neon skeleton (GREEN) ────────────────────────────────────────────────
  function drawNeonSkeleton(lms) {
    const c = '#00ff44';
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#00ff66';
    ctx.strokeStyle = c;
    ctx.lineWidth = 3;
    const conn = [
      [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],[0,17]
    ];
    conn.forEach(([a,b]) => {
      ctx.beginPath();
      ctx.moveTo(lms[a].x*canvas.width, lms[a].y*canvas.height);
      ctx.lineTo(lms[b].x*canvas.width, lms[b].y*canvas.height);
      ctx.stroke();
    });
    ctx.fillStyle = c;
    lms.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x*canvas.width, p.y*canvas.height, 4, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  }

  // ─── Gesture: thumb + index + middle extended, ring + pinky curled ─────────────
  function isThreeFingerGrip(l) {
    const thumbOut  = Math.abs(l[4].x - l[3].x) > 0.02;    // thumb extended laterally
    const indexUp   = l[8].y  < l[6].y  - 0.02;             // index extended
    const middleUp  = l[12].y < l[10].y - 0.02;             // middle extended
    const ringDown  = l[16].y > l[14].y - 0.01;             // ring curled
    const pinkyDown = l[20].y > l[18].y - 0.01;             // pinky curled
    return thumbOut && indexUp && middleUp && ringDown && pinkyDown;
  }

  // ─── Main callback ─────────────────────────────────────────────────────────────
  function onResults(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) {
      handActive = false;
      smoothX = prevSX = null;
      return;
    }

    const l = results.multiHandLandmarks[0];
    drawNeonSkeleton(l);

    if (!isThreeFingerGrip(l) || !sfApi || !camReady) {
      handActive = false;
      smoothX = prevSX = null;
      return;
    }

    // Centroid X of thumb tip (4), index tip (8), middle tip (12)
    const rawX = (l[4].x + l[8].x + l[12].x) / 3;

    // Smooth position
    if (smoothX === null) smoothX = rawX;
    else smoothX += ALPHA * (rawX - smoothX);

    // First frame: snapshot camera, store prev position
    if (!handActive) {
      handActive = true;
      prevSX = smoothX;
      sfApi.getCameraLookAt(function(err, cam) {
        if (!err) { cEye = cam.position.slice(); cTarget = cam.target.slice(); }
      });
      return;
    }

    // Frame-to-frame delta
    const dx = smoothX - prevSX;
    prevSX = smoothX;

    if (Math.abs(dx) < MIN_DELTA || !cEye) return;

    // Rotate camera around Y-axis
    cEye = rotateY(cEye, cTarget, dx * GAIN);
    sfApi.setCameraLookAt(cEye, cTarget, 0.05);
  }

  // ─── Init MediaPipe ────────────────────────────────────────────────────────────
  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.85, minTrackingConfidence:0.85 });
  hands.onResults(onResults);
  const cam = new Camera(videoEl, {
    onFrame: async () => { await hands.send({image:videoEl}); },
    width: 1280, height: 720
  });
  cam.start();
</script>
