<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<!-- POST PROCESSING DEPENDENCIES (FIXED) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/VignetteShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/GammaCorrectionShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Reflector.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f5;overflow:hidden}
#three-container{width:100vw;height:100vh}
</style>
</head>
<body>
<div id="three-container"></div>
<script>
function init(){
const container=document.getElementById('three-container')

const scene=new THREE.Scene()
scene.background=new THREE.Color(0xf5f5f5)

const camera=new THREE.PerspectiveCamera(35,window.innerWidth/window.innerHeight,.1,1000)
camera.position.set(0,2,8)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2))
renderer.outputEncoding=THREE.sRGBEncoding
renderer.toneMapping=THREE.ACESFilmicToneMapping
renderer.toneMappingExposure=1.2
renderer.shadowMap.enabled=true
container.appendChild(renderer.domElement)

// POST PROCESSING (NOW SAFE)
const composer=new THREE.EffectComposer(renderer)
composer.addPass(new THREE.RenderPass(scene,camera))

const bloom=new THREE.UnrealBloomPass(
new THREE.Vector2(window.innerWidth,window.innerHeight),
0.25,
0.4,
0.85
)
composer.addPass(bloom)

composer.addPass(new THREE.ShaderPass(THREE.VignetteShader))
composer.addPass(new THREE.ShaderPass(THREE.GammaCorrectionShader))

// HDRI
new THREE.RGBELoader().load('/assets/hdri/studio_small_09_1k.hdr',(hdr)=>{
const pmrem=new THREE.PMREMGenerator(renderer)
scene.environment=pmrem.fromEquirectangular(hdr).texture
hdr.dispose();pmrem.dispose()
})

// LIGHTS (FIXED ADD BUG)
const key=new THREE.DirectionalLight(0xffffff,2.5)
key.position.set(6,10,6)
key.castShadow=true
scene.add(key)

const fill=new THREE.DirectionalLight(0xffffff,0.5)
fill.position.set(-6,4,2)
scene.add(fill)

const rim=new THREE.DirectionalLight(0xffffff,1)
rim.position.set(0,6,-8)
scene.add(rim)

scene.add(new THREE.HemisphereLight(0xffffff,0xcccccc,0.25))

// REFLECTIVE FLOOR
const reflector=new THREE.Reflector(new THREE.PlaneGeometry(30,30),{
textureWidth:1024,
textureHeight:1024,
color:0xaaaaaa
})
reflector.rotation.x=-Math.PI/2
reflector.position.y=0
scene.add(reflector)

const shadowFloor=new THREE.Mesh(
new THREE.PlaneGeometry(30,30),
new THREE.ShadowMaterial({opacity:0.08})
)
shadowFloor.rotation.x=-Math.PI/2
shadowFloor.position.y=0.001
shadowFloor.receiveShadow=true
scene.add(shadowFloor)

// CONTROLS
const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true
controls.dampingFactor=0.07
controls.autoRotate=true
controls.autoRotateSpeed=0.25
controls.zoomSpeed=3
controls.target.set(0,0.6,0)

// EDGE HIGHLIGHT
function addEdgeHighlights(mat){
mat.onBeforeCompile=(shader)=>{
shader.fragmentShader=shader.fragmentShader.replace(
'#include <output_fragment>',
`float edge = pow(1.0 - dot(normalize(vNormal), normalize(vViewPosition)), 3.0);
gl_FragColor.rgb += edge * 0.35;
#include <output_fragment>`
)
}
}

new THREE.GLTFLoader().load('/assets/models/batmobile_armored.glb',gltf=>{
  const model=gltf.scene;

  model.traverse(o=>{
    if(!o.isMesh) return;

    o.castShadow=o.receiveShadow=true;

    const mat=o.material;

    if(!mat) return;

    // GLASS
    if(mat.transparent || mat.opacity < 0.95){
      mat.transmission = 0.6;
      mat.roughness = 0.05;
      mat.envMapIntensity = 2.5;
      return;
    }

    // METAL (wheels)
    if(mat.metalness > 0.6){
      mat.envMapIntensity = 2;
      mat.roughness = Math.max(mat.roughness,0.2);
      return;
    }

    // PAINT
    mat.clearcoat = 0.6;
    mat.clearcoatRoughness = 0.08;
    mat.envMapIntensity = 1.6;
  });

  scene.add(model);
});


function animate(){
requestAnimationFrame(animate)
controls.update()
composer.render()
}
animate()

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)
composer.setSize(window.innerWidth,window.innerHeight)
})
}
init()
</script>
</body>
</html>
